# 第一行显示完整路径、Git 分支和失败状态；第二行显示可切换色板的提示符。
add_newline = false
palette = "dracula_pro"
format = "$directory$git_branch$git_status$status\n$character"

[directory]
# 使用当前色板中的目录色显示完整路径，并保持目录不截断。
truncation_length = 0
truncate_to_repo = false
style = "bold directory"
format = "[$path]($style)"

[git_branch]
# 使用当前色板中的分支色突出当前 Git 分支。
symbol = "git "
style = "bold branch"
format = " [${symbol}${branch}]($style)"

[git_status]
# 使用当前色板中的状态色显示工作区变化与 ahead/behind 状态。
style = "bold status"
format = " [$all_status$ahead_behind]($style)"

[status]
# 使用当前色板中的错误色在命令失败时显示退出码。
disabled = false
symbol = "× "
style = "bold error"
format = " [$symbol$status]($style)"

[character]
# 成功、失败与 Vim 模式提示符都跟随当前色板。
success_symbol = "[❯](bold success)"
error_symbol = "[❯](bold error)"
vimcmd_symbol = "[❮](bold vim)"

[palettes.dracula_pro]
# 记录与 Windows Terminal 的 Dracula Pro 方案一致的关键颜色，便于后续同步调整。
background = "#181A22"
foreground = "#D7DEEE"
directory = "#8DECF7"
branch = "#FF8FD1"
status = "#F6D68A"
error = "#FF7A90"
success = "#6FE1B1"
vim = "#B7A1FF"
selection = "#343A4F"

[palettes.nord]
# 提供与 Windows Terminal Nord 方案一致的关键颜色，切换时只需修改顶部 palette。
background = "#2E3440"
foreground = "#D8DEE9"
directory = "#88C0D0"
branch = "#B48EAD"
status = "#EBCB8B"
error = "#BF616A"
success = "#A3BE8C"
vim = "#81A1C1"
selection = "#434C5E"
