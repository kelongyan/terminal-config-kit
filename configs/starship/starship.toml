add_newline = false
format = "$directory$git_branch$git_status$status\n$character"

[directory]
truncation_length = 0
truncate_to_repo = false
style = "bold #89DCEB"
format = "[$path]($style)"

[git_branch]
symbol = "git "
style = "bold #CBA6F7"
format = " [${symbol}${branch}]($style)"

[git_status]
style = "bold #F9E2AF"
format = " [$all_status$ahead_behind]($style)"

[status]
disabled = false
symbol = "× "
style = "bold #F38BA8"
format = " [$symbol$status]($style)"

[character]
success_symbol = "[❯](bold #A6E3A1)"
error_symbol = "[❯](bold #F38BA8)"
vimcmd_symbol = "[❮](bold #89B4FA)"

[palettes.cyberpunk_hack]
# 偏蓝赛博风备用色板，强调冷静的蓝青科技感。
directory = "#57C7FF"
branch = "#8E9BFF"
status = "#D9BC74"
error = "#E67E8A"
success = "#56BFAE"
vim = "#5AA9FA"

[palettes.sublime_mater]
# Sublime Mater 备用色板，强调温润的蓝绿与金色层次。
directory = "#58D1C9"
branch = "#C792EA"
status = "#E6C36A"
error = "#F07178"
success = "#A7C56B"
vim = "#6CB6FF"

[palettes.monokai_sublime_modern]
# Monokai/Sublime 暖色经典备用色板，保留暖黄与黄绿色主调。
directory = "#78DCE8"
branch = "#C792EA"
status = "#FFD866"
error = "#FF7A88"
success = "#A9DC76"
vim = "#6DB7FF"
